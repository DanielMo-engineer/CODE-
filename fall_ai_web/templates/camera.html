<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="/static/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>摄像头 — RDK X5 智能平台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#000;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
    overflow:hidden;height:100vh;width:100vw;
  }
  #videoWrap{
    position:relative;width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  #mjpegStream{
    max-width:100vw;max-height:100vh;
    object-fit:contain;
  }
  .topbar{
    position:fixed;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;
    background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%);
    z-index:100;
  }
  .topbar .back{
    display:flex;align-items:center;gap:8px;
    color:#fff;text-decoration:none;font-size:0.9rem;
    padding:6px 12px;border-radius:10px;
    background:rgba(255,255,255,0.1);
    transition:background .3s;cursor:pointer;
  }
  .topbar .back:hover{background:rgba(255,255,255,0.2)}
  .topbar .title{font-size:1rem;font-weight:600;color:#ddd}
  .topbar .ext-link{
    padding:5px 12px;border-radius:10px;border:none;
    background:rgba(255,255,255,0.08);color:#aaa;font-size:0.75rem;
    cursor:pointer;transition:background .3s;text-decoration:none;
  }
  .topbar .ext-link:hover{background:rgba(255,255,255,0.18);color:#fff}
  .status-overlay{
    position:fixed;bottom:20px;right:20px;
    display:flex;flex-direction:column;align-items:flex-end;gap:6px;
    z-index:100;
  }
  .status-item{
    padding:6px 14px;border-radius:10px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(8px);
    font-size:0.8rem;display:flex;align-items:center;gap:6px;
  }
  .status-item .label{color:#888}
  .status-item .value{color:#fff;font-weight:600}
  .status-item.alarm .value{color:#ff4444}
  .status-item .dot{
    width:8px;height:8px;border-radius:50%;display:inline-block;
  }
  .dot.green{background:#4caf50;animation:pulse 2s infinite}
  .dot.red{background:#ff4444;animation:pulse 0.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .fullscreen-btn{
    position:fixed;top:60px;right:20px;z-index:100;
    width:40px;height:40px;border-radius:50%;
    background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
    color:#fff;font-size:1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .3s;
  }
  .fullscreen-btn:hover{background:rgba(255,255,255,0.2)}
  .alert-overlay{
    display:none;position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.75);z-index:9999;
    justify-content:center;align-items:center;
  }
  .alert-overlay.show{display:flex}
  .alert-box{
    background:linear-gradient(135deg,#1a0a0a,#2d0a0a);
    border:2px solid #ff4444;border-radius:16px;
    padding:40px 50px;text-align:center;
    animation:alertPulse 1s infinite alternate;
  }
  @keyframes alertPulse{from{box-shadow:0 0 20px rgba(255,0,0,0.3)}to{box-shadow:0 0 60px rgba(255,0,0,0.8)}}
  .alert-box .alert-icon{font-size:4rem;display:block;margin-bottom:10px}
  .alert-box h2{color:#ff4444;font-size:1.5rem;margin-bottom:6px}
  .alert-box p{color:#cc8888;font-size:0.9rem}
  .alert-box button{
    margin-top:20px;padding:10px 30px;border:none;
    border-radius:10px;background:#ff4444;color:#fff;
    font-size:1rem;cursor:pointer;transition:background .3s;
  }
  .alert-box button:hover{background:#cc3333}
  .loading{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;color:#666;z-index:1;
  }
  .loading .spinner{
    width:40px;height:40px;margin:0 auto 12px;
    border:3px solid #333;border-top-color:#667eea;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div id="videoWrap">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>连接摄像头...</div>
    </div>
    <img id="mjpegStream" />
  </div>

  <div class="topbar">
    <a class="back" href="/">← 返回</a>
    <span class="title">📷 实时监控</span>
    <a class="ext-link" id="directLink" href="#" target="_blank">查看服务器网页 ↗</a>
  </div>

  <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>

  <div class="status-overlay">
    <div class="status-item">
      <span class="dot green" id="statusDot"></span>
      <span class="label">状态</span>
      <span class="value" id="statusText">等待中</span>
    </div>
    <div class="status-item">
      <span class="label">FPS</span>
      <span class="value" id="fpsText">--</span>
    </div>
    <div class="status-item">
      <span class="label">人数</span>
      <span class="value" id="peopleText">--</span>
    </div>
  </div>

  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-box">
      <span class="alert-icon">🚨</span>
      <h2>⚠️ 摔倒检测报警</h2>
      <p id="alertMsg">检测到有人摔倒！</p>
      <button onclick="dismissAlert()">我知道了</button>
    </div>
  </div>


<script>
  const img = document.getElementById("mjpegStream");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const fpsText = document.getElementById("fpsText");
  const peopleText = document.getElementById("peopleText");
  const loading = document.getElementById("loading");

  // 从当前页面地址推断摄像头流地址：替换 5050 端口为 8080
  function getStreamUrl() {
    return window.location.origin.replace(/:\d+/, ":8080") + "/stream";
  }

  // 1) 先尝试通过设置获取自定义摄像头地址
  fetch("/api/settings", {cache: "no-store"})
    .then(r => r.json())
    .then(data => {
      const url = (data.CAMERA_URL || "").replace(/\/+$/, "");
      if (url) {
        const streamUrl = url + "/stream";
        document.getElementById("directLink").href = url + "/";
        loadStream(streamUrl);
      } else {
        loadStream(getStreamUrl());
      }
    })
    .catch(() => {
      loadStream(getStreamUrl());
    });

  function loadStream(url) {
    img.src = url;
    img.onerror = function() {
      // 重试：试试默认 8080 端口
      const retryUrl = getStreamUrl();
      if (img.src !== retryUrl) {
        img.src = retryUrl;
        img.onerror = function() {
          loading.querySelector("div:last-child").textContent = "⚠️ 摄像头连接失败，请在设置中检查摄像头地址";
          loading.querySelector(".spinner").style.display = "none";
        };
      } else {
        loading.querySelector("div:last-child").textContent = "⚠️ 摄像头连接失败，请在设置中检查摄像头地址";
        loading.querySelector(".spinner").style.display = "none";
      }
    };
  }

  img.onload = () => { loading.style.display = "none"; };

  function pollStatus() {
    fetch("/api/status", {cache: "no-store"})
      .then(r => r.json())
      .then(data => {
        if (data.status === "NORMAL" || data.status === "OK") {
          statusDot.className = "dot green";
          statusText.textContent = "正常";
          statusText.style.color = "#4caf50";
        } else {
          statusDot.className = "dot red";
          statusText.textContent = data.status || "异常";
          statusText.style.color = "#ff4444";
        }
        fpsText.textContent = data.fps || "--";
        peopleText.textContent = data.people !== undefined ? data.people : "--";
        if (data.alarm && !alertDismissed) {
          document.getElementById("alertMsg").textContent =
            `检测到有人摔倒！时间: ${new Date().toLocaleTimeString()}`;
          document.getElementById("alertOverlay").classList.add("show");
          beepAlarm();
        }
      })
      .catch(() => {
        statusDot.className = "dot";
        statusDot.style.background = "#666";
        statusText.textContent = "离线";
        fpsText.textContent = "--";
        peopleText.textContent = "--";
      });
  }

  function beepAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [880, 660].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = "sine";
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.8);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.8 + 0.6);
        osc.start(ctx.currentTime + i * 0.8);
        osc.stop(ctx.currentTime + i * 0.8 + 0.6);
      });
    } catch(e) {}
  }

  let alertDismissed = false;
  pollStatus();
  setInterval(pollStatus, 1000);

  function dismissAlert() { document.getElementById("alertOverlay").classList.remove("show"); }
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.body.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("/static/sw.js").catch(() => {}));
  }
</script>
</body>
</html>
