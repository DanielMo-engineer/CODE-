<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>告警记录 — RDK X5 智能平台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#fff;
  }
  .header{
    background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;
  }
  .header .back{color:#a0a0d0;text-decoration:none;font-size:1.2rem;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .header .back:hover{background:rgba(255,255,255,0.1)}
  .header h1{font-size:1.05rem;font-weight:600}
  .header .actions{margin-left:auto;display:flex;gap:8px}
  .header .actions button{
    padding:6px 14px;border-radius:10px;border:none;
    font-size:0.75rem;cursor:pointer;
    background:rgba(255,255,255,0.08);color:#a0a0c0;
    transition:all .2s;
  }
  .header .actions button:hover{background:rgba(255,255,255,0.15);color:#fff}
  .content{max-width:700px;margin:0 auto;padding:16px}

  /* 统计行 */
  .stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .stat-pill{
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;padding:12px 18px;flex:1;min-width:100px;text-align:center;
  }
  .stat-pill .num{font-size:1.5rem;font-weight:700;display:block}
  .stat-pill .label{font-size:0.7rem;color:#8080a0;margin-top:2px}

  /* 告警列表 */
  .alert-item{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:16px 18px;margin-bottom:10px;
    transition:all .3s;
  }
  .alert-item:hover{background:rgba(255,255,255,0.08)}
  .alert-item.unread{
    border-color:rgba(255,68,68,0.3);
    background:rgba(255,68,68,0.06);
  }
  .alert-icon{font-size:1.8rem;flex-shrink:0;width:40px;text-align:center}
  .alert-body{flex:1}
  .alert-body .time{font-size:0.7rem;color:#606080}
  .alert-body .detail{font-size:0.85rem;margin-top:3px}
  .alert-body .meta{font-size:0.7rem;color:#606080;margin-top:2px}
  .alert-status{flex-shrink:0;font-size:0.7rem;padding:4px 12px;border-radius:8px}
  .alert-status.unack{background:rgba(255,68,68,0.2);color:#ff6666}
  .alert-status.ack{background:rgba(76,175,80,0.2);color:#4caf50}
  .alert-ack-btn{
    flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;
    font-size:0.72rem;cursor:pointer;
    background:rgba(102,126,234,0.2);color:#a0b0ff;
    transition:all .2s;
  }
  .alert-ack-btn:hover{background:rgba(102,126,234,0.35)}
  .alert-ack-btn:disabled{opacity:0.4;cursor:default}

  .empty{text-align:center;padding:80px 20px;color:#606080}
  .empty .icon{font-size:3rem;margin-bottom:10px}
  .empty h3{font-size:1rem;margin-bottom:6px;color:#8080a0}
  .empty p{font-size:0.8rem}

  .load-more{
    text-align:center;padding:16px;
  }
  .load-more button{
    padding:8px 24px;border-radius:10px;border:none;
    background:rgba(255,255,255,0.06);color:#a0a0c0;
    font-size:0.82rem;cursor:pointer;
    transition:all .3s;
  }
  .load-more button:hover{background:rgba(255,255,255,0.12);color:#fff}
</style>
</head>
<body>
  <div class="header">
    <a class="back" href="/">←</a>
    <h1>🚨 告警记录</h1>
    <div class="actions">
      <button onclick="ackAllAlerts()">全部已读</button>
      <button onclick="clearAllAlerts()" style="color:#ff6666">🗑️ 一键删除</button>
      <button onclick="refreshList()">刷新</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-pill">
        <span class="num" id="totalAlerts" style="color:#8080a0">0</span>
        <span class="label">全部</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="unreadAlerts" style="color:#ff6666">0</span>
        <span class="label">未处理</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="ackAlerts" style="color:#4caf50">0</span>
        <span class="label">已确认</span>
      </div>
    </div>

    <div id="alertList"></div>
  </div>

<script>
  let offset = 0;
  const LIMIT = 50;
  let hasMore = true;

  function loadAlerts(append = false) {
    if (!append) { offset = 0; hasMore = true; }

    fetch(`/api/alerts?limit=${LIMIT}&offset=${offset}`, {cache: 'no-store'})
      .then(r => r.json())
      .then(d => {
        const list = document.getElementById('alertList');
        const alerts = d.alerts || [];

        // 统计
        document.getElementById('totalAlerts').textContent = d.total;
        document.getElementById('unreadAlerts').textContent = d.unread;
        document.getElementById('ackAlerts').textContent = d.total - d.unread;

        if (!append) {
          list.innerHTML = '';
        }

        if (alerts.length === 0) {
          list.innerHTML = `
            <div class="empty">
              <div class="icon">🛡️</div>
              <h3>暂无告警记录</h3>
              <p>当检测到摔倒事件时，记录会自动出现在这里</p>
            </div>
          `;
          hasMore = false;
          return;
        }

        hasMore = alerts.length >= LIMIT;

        alerts.forEach(a => {
          const isUnread = !a.acknowledged;
          const typeIcon = a.type === 'fall' ? '🚨' : '⚠️';
          const div = document.createElement('div');
          div.className = 'alert-item' + (isUnread ? ' unread' : '');
          div.innerHTML = `
            <div class="alert-icon">${typeIcon}</div>
            <div class="alert-body">
              <div class="time">${a.time}</div>
              <div class="detail">${a.detail}</div>
              <div class="meta">人数: ${a.people || 0} · FPS: ${a.fps || 0}</div>
            </div>
            <div class="alert-status ${isUnread ? 'unack' : 'ack'}">
              ${isUnread ? '待确认' : '✓ 已确认'}
            </div>
            ${isUnread ? `<button class="alert-ack-btn" onclick="ackAlert(${a.id}, this)">确认</button>` : ''}
          `;
          list.appendChild(div);
        });

        // 加载更多按钮
        const moreWrap = list.querySelector('.load-more');
        if (moreWrap) moreWrap.remove();
        if (hasMore) {
          const wrap = document.createElement('div');
          wrap.className = 'load-more';
          wrap.innerHTML = `<button onclick="loadMore()">加载更多 (${offset + alerts.length} / ${d.total})</button>`;
          list.appendChild(wrap);
        }

        offset += alerts.length;
      })
      .catch(() => {
        document.getElementById('alertList').innerHTML = `
          <div class="empty">
            <div class="icon">❌</div>
            <h3>加载失败</h3>
            <p>请检查网络连接</p>
          </div>
        `;
      });
  }

  function loadMore() {
    loadAlerts(true);
  }

  function refreshList() {
    loadAlerts(false);
  }

  function ackAlert(id, btn) {
    btn.disabled = true;
    btn.textContent = '确认中...';
    fetch('/api/alerts/ack', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id})
    })
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        refreshList();
        // 如果是从主页跳转，更新主页未读数
      } else {
        btn.disabled = false;
        btn.textContent = '确认';
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = '确认';
    });
  }

  function ackAllAlerts() {
    fetch('/api/alerts/ack-all', {method: 'POST'})
      .then(r => r.json())
      .then(d => {
        if (d.count > 0) {
          refreshList();
        }
      })
      .catch(() => {});
  }

  function clearAllAlerts() {
    if (!confirm('确定要删除所有告警记录吗？\n此操作不可撤销！')) return;
    fetch('/api/alerts/clear', {method: 'POST'})
      .then(r => r.json())
      .then(d => {
        if (d.ok) {
          refreshList();
        }
      })
      .catch(() => {});
  }

  // ── 初始化 ──
  loadAlerts();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js').catch(() => {}));
  }
</script>
</body>
</html>
